<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Student Market Palace</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<nav class="navbar">
  <div class="nav-brand">🎓 Student Market Palace</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="products.html">Browse</a>
    <a href="login.html">Login</a>
    <a href="register.html" class="btn-nav active">Register</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <h2>Create Account</h2>
    <p class="auth-sub">Join the student marketplace today</p>
    <div id="alertBox"></div>
    <form id="registerForm" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Your full name" minlength="2" required/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="student@university.edu" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min 6 characters" minlength="6" required/>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat password" required/>
      </div>
      <button type="submit" class="btn-primary" id="registerBtn">Create Account</button>
    </form>
    <p class="auth-link">Already have an account? <a href="login.html">Login here</a></p>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  if (localStorage.getItem('token')) window.location.href = 'index.html';

  async function handleRegister(e) {
    e.preventDefault();
    const btn = document.getElementById('registerBtn');
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;

    if (password !== confirm) { showAlert('Passwords do not match.', 'error'); return; }

    btn.textContent = 'Creating account...'; btn.disabled = true;
    try {
      await API.register(name, email, password);
      showAlert('Account created! Redirecting to login...', 'success');
      setTimeout(() => window.location.href = 'login.html', 1500);
    } catch(e) {
      showAlert(e.message || 'Registration failed. Try again.', 'error');
      btn.textContent = 'Create Account'; btn.disabled = false;
    }
  }

  function showAlert(msg, type) {
    document.getElementById('alertBox').innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  }
</script>
</body>
</html>
