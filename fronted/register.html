<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Student Market Palace</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<nav class="navbar">
  <a class="nav-brand" href="index.html">🎓 Student Market Palace</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="products.html">Browse</a>
    <a href="login.html">Login</a>
    <a href="register.html" class="btn-nav active">Register</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <span class="auth-icon">🎓</span>
    <h2>Create Account</h2>
    <p class="auth-sub">Join Student Market Palace — buy &amp; sell on campus</p>
    <div id="alertBox"></div>
    <form id="registerForm" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Your full name" minlength="2" required/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="student@university.edu" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min 6 characters" minlength="6" required/>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat password" required/>
      </div>

      <!-- Password strength bar -->
      <div style="margin:-8px 0 16px">
        <div style="height:4px;border-radius:4px;background:var(--bg3);overflow:hidden">
          <div id="strengthBar" style="height:100%;width:0%;border-radius:4px;transition:width 0.3s,background 0.3s"></div>
        </div>
        <div id="strengthLabel" style="font-size:0.74rem;color:var(--text3);margin-top:4px"></div>
      </div>

      <button type="submit" class="btn-primary" id="registerBtn">Create Account →</button>
    </form>
    <p class="auth-link">Already have an account? <a href="login.html">Login here</a></p>
    <div style="margin-top:20px;padding:14px 16px;background:var(--bg3);border-radius:10px;border:1px solid var(--border);font-size:0.8rem;color:var(--text3);line-height:1.6">
      By registering you agree to our
      <a href="index.html#terms" style="color:var(--purple-light)">Terms of Service</a>.
      This platform is exclusively for UMT students.
    </div>
  </div>
</div>

<div id="footerContent"></div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  // If already logged in, go to home
  if (localStorage.getItem('token')) window.location.href = 'index.html';

  renderFooter('footerContent');

  // Password strength meter
  document.getElementById('password').addEventListener('input', function() {
    const v = this.value;
    const bar = document.getElementById('strengthBar');
    const lbl = document.getElementById('strengthLabel');
    let score = 0;
    if (v.length >= 6)  score++;
    if (v.length >= 10) score++;
    if (/[A-Z]/.test(v)) score++;
    if (/[0-9]/.test(v)) score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;
    const levels = [
      { w:'0%',   c:'transparent', t:'' },
      { w:'25%',  c:'#ef4444',     t:'Weak' },
      { w:'50%',  c:'#f59e0b',     t:'Fair' },
      { w:'75%',  c:'#06b6d4',     t:'Good' },
      { w:'100%', c:'#10b981',     t:'Strong 💪' },
    ];
    const l = levels[Math.min(score, 4)];
    bar.style.width = l.w; bar.style.background = l.c;
    lbl.textContent = l.t; lbl.style.color = l.c;
  });

  async function handleRegister(e) {
    e.preventDefault();
    const btn      = document.getElementById('registerBtn');
    const name     = document.getElementById('name').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirmPassword').value;

    if (password !== confirm) {
      showAlert('Passwords do not match.', 'error');
      return;
    }

    btn.textContent = 'Creating account…';
    btn.disabled    = true;

    try {
      await API.register(name, email, password);
      showAlert('✅ Account created! Redirecting to login…', 'success');
      setTimeout(() => window.location.href = 'login.html', 1500);
    } catch(err) {
      showAlert(err.message || 'Registration failed. Try again.', 'error');
      btn.textContent = 'Create Account →';
      btn.disabled    = false;
    }
  }

  function showAlert(msg, type) {
    document.getElementById('alertBox').innerHTML =
      `<div class="alert alert-${type}">${msg}</div>`;
  }
</script>
</body>
</html>
