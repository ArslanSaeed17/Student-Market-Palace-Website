<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Profile — Student Market Palace</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<nav class="navbar">
  <a class="nav-brand" href="index.html">🎓 Student Market Palace</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="products.html">Browse</a>
    <span id="authNav">
      <a href="login.html">Login</a>
      <a href="register.html" class="btn-nav">Register</a>
    </span>
    <span id="userNav" style="display:none">
      <a href="sell.html" class="btn-nav-sell">+ Sell Item</a>
      <a href="profile.html" class="active">My Profile</a>
      <a href="#" onclick="logout()" class="btn-logout">Logout</a>
    </span>
  </div>
</nav>

<div class="container profile-page">

  <!-- Profile banner -->
  <div class="profile-banner" id="profileBanner">
    <div class="loading">⏳ Loading profile…</div>
  </div>

  <!-- Tabs -->
  <div class="profile-tabs" id="profileTabs" style="display:none">
    <button class="tab-btn active" onclick="switchTab('listings', this)">📦 My Listings</button>
    <button class="tab-btn" onclick="switchTab('account', this)">⚙️ Account Info</button>
  </div>

  <!-- Listings tab -->
  <div id="tabListings">
    <!-- Status filter pills -->
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px">
      <div style="display:flex;gap:8px;flex-wrap:wrap" id="statusPills">
        <button class="pill-btn active" onclick="filterListings('all', this)">All</button>
        <button class="pill-btn" onclick="filterListings('available', this)">Available</button>
        <button class="pill-btn" onclick="filterListings('reserved', this)">Reserved</button>
        <button class="pill-btn" onclick="filterListings('sold', this)">Sold</button>
      </div>
      <a href="sell.html" class="btn-primary" style="width:auto;padding:10px 20px;font-size:0.88rem">+ New Listing</a>
    </div>
    <div class="products-grid" id="myListings">
      <div class="loading">⏳ Loading listings…</div>
    </div>
  </div>

  <!-- Account tab -->
  <div id="tabAccount" style="display:none">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px;max-width:540px">
      <h2 style="font-size:1.15rem;font-weight:700;margin-bottom:24px;color:var(--text)">⚙️ Account Details</h2>
      <div id="accountDetails" style="display:flex;flex-direction:column;gap:18px;color:var(--text2);font-size:0.92rem"></div>
      <div style="margin-top:28px;padding-top:20px;border-top:1px solid var(--border)">
        <p style="font-size:0.82rem;color:var(--text3);margin-bottom:14px">Need help with your account?</p>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <a href="https://wa.me/923008971489" target="_blank"
             style="display:inline-flex;align-items:center;gap:6px;padding:9px 16px;background:rgba(37,211,102,0.12);color:#6ee7b7;border:1px solid rgba(37,211,102,0.25);border-radius:8px;font-size:0.82rem;font-weight:600">
            💬 WhatsApp Support
          </a>
          <a href="mailto:arslanbrall@gmail.com"
             style="display:inline-flex;align-items:center;gap:6px;padding:9px 16px;background:var(--purple-dim);color:var(--purple-light);border:1px solid var(--border2);border-radius:8px;font-size:0.82rem;font-weight:600">
            📧 Email Support
          </a>
        </div>
      </div>
    </div>
  </div>

</div>

<div id="footerContent"></div>

<style>
  .pill-btn {
    padding: 6px 16px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .pill-btn.active, .pill-btn:hover {
    background: var(--purple);
    color: #fff;
    border-color: var(--purple);
  }
</style>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  requireAuth();
  checkAuthNav();
  renderFooter('footerContent');

  let profileData = null;
  let allMyListings = [];   // ALL statuses
  let activeFilter  = 'all';

  loadProfile();

  async function loadProfile() {
    const token = localStorage.getItem('token');
    try {
      profileData = await API.getProfile(token);

      // ── FIX: Fetch ALL products (skip=0, limit=500) then filter by user_id
      //    This gets available + reserved + sold because the profile endpoint
      //    needs all statuses. For a proper fix a /users/me/products endpoint
      //    would be ideal, but this works with the current backend.
      const available = await API.getProducts(0, 500);

      // Also try to get reserved/sold via filter endpoint
      let reserved = [], sold = [];
      try { reserved = await API.filterProducts('', 'reserved'); } catch(e) {}
      try { sold     = await API.filterProducts('', 'sold');     } catch(e) {}

      // Combine and de-duplicate by product_id
      const seen = new Set();
      const combined = [...available, ...reserved, ...sold].filter(p => {
        if (seen.has(p.product_id)) return false;
        seen.add(p.product_id);
        return true;
      });

      // Keep only this user's listings
      allMyListings = combined.filter(p => p.user_id === profileData.user_id);

      const activeCount   = allMyListings.filter(p => p.status === 'available').length;
      const reservedCount = allMyListings.filter(p => p.status === 'reserved').length;
      const soldCount     = allMyListings.filter(p => p.status === 'sold').length;

      const initial = profileData.name.charAt(0).toUpperCase();
      const joined  = new Date(profileData.created_at).toLocaleDateString('en-US', { year:'numeric', month:'long' });

      document.getElementById('profileBanner').innerHTML = `
        <div class="profile-top">
          <div class="profile-avatar">${initial}</div>
          <div class="profile-info">
            <h1>${profileData.name}</h1>
            <p>📧 ${profileData.email}</p>
            <p>📅 Member since ${joined}</p>
          </div>
          <div class="profile-actions">
            <a href="sell.html" class="btn-primary">+ Post New Listing</a>
          </div>
        </div>
        <div class="profile-stats">
          <div class="stat-card">
            <div class="stat-num">${allMyListings.length}</div>
            <div class="stat-label">Total Listings</div>
          </div>
          <div class="stat-card">
            <div class="stat-num">${activeCount}</div>
            <div class="stat-label">Active</div>
          </div>
          <div class="stat-card">
            <div class="stat-num">${reservedCount}</div>
            <div class="stat-label">Reserved</div>
          </div>
          <div class="stat-card">
            <div class="stat-num">${soldCount}</div>
            <div class="stat-label">Sold</div>
          </div>
        </div>`;

      document.getElementById('profileTabs').style.display = 'flex';
      renderListings('all');

      // Account details
      document.getElementById('accountDetails').innerHTML = `
        <div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)">
          <span style="color:var(--text3)">Full Name</span><span>${profileData.name}</span>
        </div>
        <div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)">
          <span style="color:var(--text3)">Email</span><span>${profileData.email}</span>
        </div>
        <div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)">
          <span style="color:var(--text3)">Member Since</span><span>${joined}</span>
        </div>
        <div style="display:flex;justify-content:space-between;padding:12px 0">
          <span style="color:var(--text3)">Account Status</span>
          <span style="color:var(--green);font-weight:600">✅ Active</span>
        </div>`;

    } catch(err) {
      document.getElementById('profileBanner').innerHTML =
        '<p class="error">Failed to load profile. Please log in again. <a href="login.html">Login</a></p>';
    }
  }

  function filterListings(status, btn) {
    activeFilter = status;
    document.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    renderListings(status);
  }

  function renderListings(status) {
    const grid = document.getElementById('myListings');
    const list = status === 'all'
      ? allMyListings
      : allMyListings.filter(p => p.status === status);

    if (!list.length) {
      const labels = { all: "No listings yet.", available: "No available listings.", reserved: "No reserved listings.", sold: "No sold listings." };
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1;text-align:center;padding:48px 20px">
          <div class="empty-icon">📭</div>
          <h3>${labels[status] || 'No listings.'}</h3>
          ${status === 'all' ? '<a href="sell.html" class="btn-primary" style="width:auto;padding:11px 22px;margin-top:16px;display:inline-block">+ Post Your First Item</a>' : ''}
        </div>`;
    } else {
      grid.innerHTML = list.map(p => renderProductCard(p, true)).join('');
    }
  }

  function switchTab(tab, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    document.getElementById('tabListings').style.display = tab === 'listings' ? 'block' : 'none';
    document.getElementById('tabAccount').style.display  = tab === 'account'  ? 'block' : 'none';
  }
</script>
</body>
</html>
