<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Detail — Student Market Palace</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<nav class="navbar">
  <div class="nav-brand">🎓 Student Market Palace</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="products.html">Browse</a>
    <span id="authNav"><a href="login.html">Login</a><a href="register.html" class="btn-nav">Register</a></span>
    <span id="userNav" style="display:none">
      <a href="sell.html" class="btn-nav-sell">+ Sell Item</a>
      <a href="profile.html">My Profile</a>
      <a href="#" onclick="logout()" class="btn-logout">Logout</a>
    </span>
  </div>
</nav>

<div class="container product-detail-page" id="productDetail">
  <div class="loading">Loading product...</div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal" style="display:none">
  <div class="modal">
    <h3>Edit Listing</h3>
    <div id="editAlert"></div>
    <div class="form-group"><label>Title</label><input type="text" id="editTitle"/></div>
    <div class="form-row">
      <div class="form-group"><label>Category</label>
        <select id="editCategory">
          <option>Books</option><option>Electronics</option><option>Furniture</option>
          <option>Clothing</option><option>Sports</option><option>Other</option>
        </select>
      </div>
      <div class="form-group"><label>Condition</label>
        <select id="editCondition"><option>New</option><option>Like New</option><option>Used</option></select>
      </div>
    </div>
    <div class="form-group"><label>Price (PKR)</label><input type="number" id="editPrice" min="1"/></div>
    <div class="form-group"><label>Description</label><textarea id="editDescription" rows="3"></textarea></div>
    <div class="form-group"><label>Status</label>
      <select id="editStatus"><option value="available">Available</option><option value="reserved">Reserved</option><option value="sold">Sold</option></select>
    </div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="saveEdit()">Save Changes</button>
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<footer class="footer"><p>© 2024 Student Market Palace</p></footer>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  checkAuthNav();
  const params = new URLSearchParams(window.location.search);
  const productId = params.get('id');
  let currentProduct = null;

  if (!productId) window.location.href = 'products.html';
  else loadProduct();

  async function loadProduct() {
    const container = document.getElementById('productDetail');
    try {
      currentProduct = await API.getProduct(productId);
      const token = localStorage.getItem('token');
      const isOwner = token && await checkOwnership(currentProduct.user_id);
      const statusBadge = `<span class="badge badge-${currentProduct.status}">${currentProduct.status}</span>`;
      const img = currentProduct.image_url
        ? `<img src="${currentProduct.image_url}" alt="${currentProduct.title}" class="product-detail-img"/>`
        : `<div class="product-detail-placeholder">📦</div>`;

      container.innerHTML = `
        <a href="products.html" class="back-link">← Back to Browse</a>
        <div class="product-detail-card">
          <div class="product-detail-left">${img}</div>
          <div class="product-detail-right">
            <div class="detail-header">
              <h1>${currentProduct.title}</h1>
              ${statusBadge}
            </div>
            <div class="detail-price">PKR ${parseFloat(currentProduct.price).toLocaleString()}</div>
            <div class="detail-meta">
              <span>📁 ${currentProduct.category}</span>
              <span>✨ ${currentProduct.condition}</span>
              <span>📅 ${new Date(currentProduct.created_at).toLocaleDateString()}</span>
            </div>
            <div class="detail-description">
              <h3>Description</h3>
              <p>${currentProduct.description}</p>
            </div>
            ${isOwner ? `
              <div class="owner-actions">
                <button class="btn-primary" onclick="openEditModal()">✏️ Edit Listing</button>
                <button class="btn-danger" onclick="deleteProduct()">🗑️ Delete</button>
              </div>` : `
              <div class="buyer-actions">
                <button class="btn-primary" onclick="contactSeller()">💬 Contact Seller</button>
              </div>`}
          </div>
        </div>`;
    } catch(e) {
      container.innerHTML = '<p class="error">Product not found.</p>';
    }
  }

  async function checkOwnership(ownerId) {
    try {
      const profile = await API.getProfile(localStorage.getItem('token'));
      return profile.user_id === ownerId;
    } catch { return false; }
  }

  function openEditModal() {
    document.getElementById('editTitle').value = currentProduct.title;
    document.getElementById('editCategory').value = currentProduct.category;
    document.getElementById('editCondition').value = currentProduct.condition;
    document.getElementById('editPrice').value = currentProduct.price;
    document.getElementById('editDescription').value = currentProduct.description;
    document.getElementById('editStatus').value = currentProduct.status;
    document.getElementById('editModal').style.display = 'flex';
  }

  function closeModal() { document.getElementById('editModal').style.display = 'none'; }

  async function saveEdit() {
    const payload = {
      title: document.getElementById('editTitle').value,
      category: document.getElementById('editCategory').value,
      condition: document.getElementById('editCondition').value,
      price: parseFloat(document.getElementById('editPrice').value),
      description: document.getElementById('editDescription').value,
      status: document.getElementById('editStatus').value,
    };
    try {
      await API.updateProduct(productId, payload, localStorage.getItem('token'));
      closeModal();
      loadProduct();
    } catch(e) {
      document.getElementById('editAlert').innerHTML = `<div class="alert alert-error">${e.message}</div>`;
    }
  }

  async function deleteProduct() {
    if (!confirm('Are you sure you want to delete this listing?')) return;
    try {
      await API.deleteProduct(productId, localStorage.getItem('token'));
      alert('Listing deleted.');
      window.location.href = 'profile.html';
    } catch(e) { alert('Delete failed: ' + e.message); }
  }

  function contactSeller() {
    if (!localStorage.getItem('token')) { window.location.href = 'login.html'; return; }
    alert('Contact feature: In a full app, this would open a chat or show seller contact info.');
  }
</script>
</body>
</html>
