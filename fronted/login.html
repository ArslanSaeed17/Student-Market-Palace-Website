<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Student Market Palace</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<nav class="navbar">
  <a class="nav-brand" href="index.html">🎓 Student Market Palace</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="products.html">Browse</a>
    <a href="login.html" class="active">Login</a>
    <a href="register.html" class="btn-nav">Register</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <span class="auth-icon">🔐</span>
    <h2>Welcome Back</h2>
    <p class="auth-sub">Login to your Student Market Palace account</p>
    <div id="alertBox"></div>
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="student@university.edu" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Your password" required/>
      </div>
      <button type="submit" class="btn-primary" id="loginBtn">Login →</button>
    </form>
    <p class="auth-link">Don't have an account? <a href="register.html">Register here</a></p>

    <div class="auth-divider"><span></span><p>Need help?</p><span></span></div>
    <div style="display:flex;flex-direction:column;gap:8px;font-size:0.82rem;color:var(--text3);text-align:center">
      <a href="https://wa.me/923008971489" target="_blank" style="color:var(--green)">💬 WhatsApp Support: +92 300 8971489</a>
      <a href="mailto:arslanbrall@gmail.com" style="color:var(--purple-light)">📧 arslanbrall@gmail.com</a>
    </div>
  </div>
</div>

<div id="footerContent"></div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  if (localStorage.getItem('token')) window.location.href = 'index.html';
  renderFooter('footerContent');

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.textContent = 'Logging in…'; btn.disabled = true;
    const email    = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    try {
      const data = await API.login(email, password);
      localStorage.setItem('token', data.access_token);
      showAlert('✅ Login successful! Redirecting…', 'success');
      setTimeout(() => window.location.href = 'index.html', 1000);
    } catch(err) {
      showAlert(err.message || 'Invalid email or password.', 'error');
      btn.textContent = 'Login →'; btn.disabled = false;
    }
  }

  function showAlert(msg, type) {
    document.getElementById('alertBox').innerHTML =
      `<div class="alert alert-${type}">${msg}</div>`;
  }
</script>
</body>
</html>
