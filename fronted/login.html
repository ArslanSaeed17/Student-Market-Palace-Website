<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Student Market Palace</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<nav class="navbar">
  <div class="nav-brand">🎓 Student Market Palace</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="products.html">Browse</a>
    <a href="login.html" class="active">Login</a>
    <a href="register.html" class="btn-nav">Register</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <h2>Welcome Back</h2>
    <p class="auth-sub">Login to your student account</p>
    <div id="alertBox"></div>
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="student@university.edu" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Your password" required/>
      </div>
      <button type="submit" class="btn-primary" id="loginBtn">Login</button>
    </form>
    <p class="auth-link">Don't have an account? <a href="register.html">Register here</a></p>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  if (localStorage.getItem('token')) window.location.href = 'index.html';

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.textContent = 'Logging in...'; btn.disabled = true;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    try {
      const data = await API.login(email, password);
      localStorage.setItem('token', data.access_token);
      showAlert('Login successful! Redirecting...', 'success');
      setTimeout(() => window.location.href = 'index.html', 1000);
    } catch(e) {
      showAlert(e.message || 'Invalid email or password.', 'error');
      btn.textContent = 'Login'; btn.disabled = false;
    }
  }

  function showAlert(msg, type) {
    const box = document.getElementById('alertBox');
    box.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  }
</script>
</body>
</html>
