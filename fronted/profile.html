<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Student Profile</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <h2>🎓 Student Market Palace</h2>
        <div><a href="index.html">Home</a><a href="dashboard.html">Dashboard</a><a href="profile.html">Profile</a></div>
    </nav>
    <div class="container" style="max-width: 500px; margin-top: 4rem;">
        <div class="card">
            <h2 style="margin-bottom:1.5rem;">Account Profile Summary</h2>
            <div style="font-size:1.1rem; line-height:2;">
                <p><strong>Display Name:</strong> <span id="profName">...</span></p>
                <p><strong>Campus Email:</strong> <span id="profEmail">...</span></p>
                <p><strong>Joined Date:</strong> <span id="profDate">...</span></p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000";
        const token = localStorage.getItem('token');
        if(!token) window.location.href = "auth.html";

        async function fetchProfile() {
            const res = await fetch(`${API_URL}/users/profile`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if(res.ok) {
                const data = await res.json();
                document.getElementById('profName').innerText = data.name;
                document.getElementById('profEmail').innerText = data.email;
                document.getElementById('profDate').innerText = new Date(data.created_at).toLocaleDateString();
            } else {
                window.location.href = "auth.html";
            }
        }
        window.onload = fetchProfile;
    </script>
</body>
</html>
